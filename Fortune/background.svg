<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 1500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbe1de"/>
      <stop offset="50%" stop-color="#f9d6d1"/>
      <stop offset="100%" stop-color="#f6cbc4"/>
    </linearGradient>
    <style>
      .ink   { fill: none; stroke: #b66f6a; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
      .ink2  { fill: none; stroke: #b66f6a; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #b66f6a; stroke-width: 1; stroke-linecap: round; opacity: 0.85; }
      .inkF  { fill: #b66f6a; }
      .inkF-soft { fill: #b66f6a; opacity: 0.7; }
      .ink-dot { fill: #b66f6a; opacity: 0.9; }
    </style>
  </defs>
  <rect width="940" height="1500" fill="url(#bg)"/>

  <!-- ===== 左上：三日月＋葉（vine） ===== -->
  <g transform="translate(140,260)" stroke="#b66f6a" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 大きな三日月（左向きC） -->
    <path stroke-width="1.8" d="M 30,-80 a 75 75 0 1 0 0,160 a 60 60 0 1 1 0,-160 z"/>
    <!-- 葉のついた茎（月の上に重なって右に伸びる） -->
    <path stroke-width="1.3" d="M -10,5 q 30,-15 80,-5"/>
    <!-- 葉 4枚 -->
    <path stroke-width="1.2" d="M 10,-5 q -3,-10 -10,-12 q 5,8 5,18"/>
    <path stroke-width="1.2" d="M 28,-3 q -3,-12 -12,-15 q 6,10 5,20"/>
    <path stroke-width="1.2" d="M 48,-3 q -3,-10 -12,-13 q 7,8 6,18"/>
    <path stroke-width="1.2" d="M 65,3 q -2,-10 -10,-13 q 6,8 5,18"/>
    <!-- 装飾点 -->
    <circle cx="30" cy="40" r="1.6" fill="#b66f6a"/>
  </g>

  <!-- ===== 右上：吊るしチャイム ===== -->
  <g transform="translate(740,180)" stroke="#b66f6a" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上の弧 -->
    <path stroke-width="1.5" d="M -75,0 q 75,75 150,0"/>
    <!-- 紐＋星 -->
    <g stroke-width="0.9">
      <line x1="-50" y1="32" x2="-50" y2="92"/>
      <line x1="-25" y1="38" x2="-25" y2="116"/>
      <line x1="0"   y1="40" x2="0"   y2="138"/>
      <line x1="25"  y1="38" x2="25"  y2="116"/>
      <line x1="50"  y1="32" x2="50"  y2="92"/>
    </g>
    <!-- 吊るし飾り -->
    <g fill="#b66f6a" stroke="none">
      <path d="M -50,98 l 2,5 l 5,1 l -3.5,3.5 l 1,5 l -4.5,-2.5 l -4.5,2.5 l 1,-5 l -3.5,-3.5 l 5,-1 z"/>
      <path d="M -25,122 l 2.2,5.5 l 5.5,1 l -4,4 l 1,5.5 l -4.7,-3 l -4.7,3 l 1,-5.5 l -4,-4 l 5.5,-1 z"/>
      <path d="M 0,144 l 2.5,6 l 6,1 l -4.3,4.3 l 1,6 l -5.2,-3.2 l -5.2,3.2 l 1,-6 l -4.3,-4.3 l 6,-1 z"/>
      <path d="M 25,122 l 2.2,5.5 l 5.5,1 l -4,4 l 1,5.5 l -4.7,-3 l -4.7,3 l 1,-5.5 l -4,-4 l 5.5,-1 z"/>
      <path d="M 50,98 l 2,5 l 5,1 l -3.5,3.5 l 1,5 l -4.5,-2.5 l -4.5,2.5 l 1,-5 l -3.5,-3.5 l 5,-1 z"/>
    </g>
    <!-- 弧の下に小さい三角飾り -->
    <g stroke-width="0.7">
      <line x1="-65" y1="20" x2="-65" y2="32"/>
      <line x1="65"  y1="20" x2="65"  y2="32"/>
    </g>
  </g>

  <!-- ===== 中央上：星バースト ===== -->
  <g transform="translate(465,540)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <!-- 4本の太い線 -->
    <line stroke-width="1.4" x1="0" y1="-55" x2="0" y2="55"/>
    <line stroke-width="1.4" x1="-55" y1="0" x2="55" y2="0"/>
    <!-- 4本の細い斜め線 -->
    <line stroke-width="1.0" x1="-38" y1="-38" x2="38" y2="38"/>
    <line stroke-width="1.0" x1="-38" y1="38" x2="38" y2="-38"/>
    <!-- 8つの先端の点（dotted ray） -->
    <g fill="#b66f6a" stroke="none" opacity="0.85">
      <circle cx="0" cy="-65" r="1.2"/>
      <circle cx="0" cy="65"  r="1.2"/>
      <circle cx="-65" cy="0" r="1.2"/>
      <circle cx="65"  cy="0" r="1.2"/>
      <circle cx="-46" cy="-46" r="1"/>
      <circle cx="46"  cy="46"  r="1"/>
      <circle cx="-46" cy="46"  r="1"/>
      <circle cx="46"  cy="-46" r="1"/>
    </g>
    <!-- 中心の小さな円 -->
    <circle r="2" fill="#b66f6a"/>
  </g>

  <!-- ===== 左中：太陽の顔 ===== -->
  <g transform="translate(170,720)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <!-- 顔の円 -->
    <circle r="44" stroke-width="1.4"/>
    <!-- 目（閉じた弧） -->
    <path stroke-width="1.2" d="M -16,-6 q 5,-3 10,0"/>
    <path stroke-width="1.2" d="M  6,-6 q 5,-3 10,0"/>
    <!-- 鼻 -->
    <path stroke-width="1.1" d="M 0,0 q -3,5 -1,8"/>
    <!-- 口 -->
    <path stroke-width="1.2" d="M -8,15 q 8,5 16,0"/>
    <!-- 光線（長短交互） -->
    <g stroke-width="1.3">
      <line x1="0"  y1="-58" x2="0"  y2="-78"/>
      <line x1="0"  y1="58"  x2="0"  y2="78"/>
      <line x1="-58" y1="0"  x2="-78" y2="0"/>
      <line x1="58"  y1="0"  x2="78"  y2="0"/>
      <line x1="-41" y1="-41" x2="-55" y2="-55"/>
      <line x1="41"  y1="-41" x2="55"  y2="-55"/>
      <line x1="-41" y1="41"  x2="-55" y2="55"/>
      <line x1="41"  y1="41"  x2="55"  y2="55"/>
    </g>
    <g stroke-width="0.9" opacity="0.85">
      <line x1="-22" y1="-54" x2="-28" y2="-68"/>
      <line x1="22"  y1="-54" x2="28"  y2="-68"/>
      <line x1="-54" y1="-22" x2="-68" y2="-28"/>
      <line x1="54"  y1="-22" x2="68"  y2="-28"/>
      <line x1="-54" y1="22"  x2="-68" y2="28"/>
      <line x1="54"  y1="22"  x2="68"  y2="28"/>
      <line x1="-22" y1="54"  x2="-28" y2="68"/>
      <line x1="22"  y1="54"  x2="28"  y2="68"/>
    </g>
    <!-- 外周のドット -->
    <g fill="#b66f6a" stroke="none" opacity="0.7">
      <circle cx="0" cy="-90" r="1"/>
      <circle cx="0" cy="90" r="1"/>
      <circle cx="-90" cy="0" r="1"/>
      <circle cx="90" cy="0" r="1"/>
      <circle cx="-65" cy="-65" r="0.9"/>
      <circle cx="65" cy="-65" r="0.9"/>
      <circle cx="-65" cy="65" r="0.9"/>
      <circle cx="65" cy="65" r="0.9"/>
    </g>
  </g>

  <!-- ===== 右中：土星（リング付き）＋彗星線 ===== -->
  <g transform="translate(770,540)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <circle r="28" stroke-width="1.5"/>
    <ellipse cx="0" cy="3" rx="48" ry="11" stroke-width="1.3"/>
    <ellipse cx="-2" cy="0" rx="42" ry="6" stroke-width="0.9" opacity="0.75"/>
    <!-- 彗星の尾（左に -->
    <path stroke-width="1.1" d="M -55,-15 q -25,5 -50,15"/>
    <!-- 散りばめた小ドット -->
    <g fill="#b66f6a" stroke="none">
      <circle cx="-72" cy="-30" r="1.3" opacity="0.8"/>
      <circle cx="55" cy="32" r="1.2" opacity="0.6"/>
      <circle cx="-25" cy="40" r="1" opacity="0.5"/>
    </g>
    <!-- 「×」マーク -->
    <g stroke-width="0.9" opacity="0.7">
      <line x1="-58" y1="35" x2="-50" y2="43"/>
      <line x1="-50" y1="35" x2="-58" y2="43"/>
    </g>
  </g>

  <!-- ===== 中央：ウェーブ（流れる線）＋薔薇 ===== -->
  <g transform="translate(470,870)" stroke="#b66f6a" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上のウェーブ（山型） -->
    <path stroke-width="1.6" d="M -210,-15 q 30,-90 70,-30 q 25,40 60,-20 q 30,-50 70,30"/>
    <!-- 中段のクロス -->
    <path stroke-width="1.6" d="M -240,15 q 50,-25 110,15 q 50,30 110,-15 q 60,-30 90,30"/>
    <!-- 下にループする線 -->
    <path stroke-width="1.4" d="M -190,30 q 30,30 90,15 q 60,-15 110,15"/>
    <path stroke-width="1.2" d="M -160,52 q 30,15 70,5"/>
    <path stroke-width="1.0" d="M -260,5 q 20,15 50,8"/>

    <!-- 薔薇（右側） -->
    <g transform="translate(180,5)">
      <!-- 外輪郭 -->
      <circle r="46" stroke-width="1.6"/>
      <!-- 花弁の渦巻き -->
      <path stroke-width="1.3" d="M -8,-10 q 12,-12 22,2 q 10,15 -8,18 q -18,2 -20,-12 q -2,-12 12,-15 q 12,-2 16,8 q 4,9 -5,13 q -8,3 -12,-5"/>
      <!-- 外側の花弁ライン -->
      <path stroke-width="1.3" d="M -28,-15 q -10,15 0,30 q 12,18 30,12"/>
      <path stroke-width="1.3" d="M 18,28 q 18,5 28,-10 q 8,-12 -2,-25"/>
      <path stroke-width="1.2" d="M -38,5 q -5,15 8,28"/>
      <path stroke-width="1.2" d="M 32,-25 q 12,5 14,18"/>
      <!-- 茎・尾の流線 -->
      <path stroke-width="1.2" d="M 42,15 q 30,15 60,-12"/>
      <path stroke-width="1.0" d="M 35,38 q 25,18 55,5"/>
    </g>
  </g>

  <!-- ===== 右中：月の横顔（円内・女性プロフィール） ===== -->
  <g transform="translate(795,805)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <circle r="22" stroke-width="1.3"/>
    <!-- 横顔の輪郭 -->
    <path stroke-width="1.2" d="M 8,-12 q -5,-2 -10,3 q -3,4 -2,8 l -2,5 q 2,3 5,2 q 1,3 6,3 q 5,0 8,-3"/>
    <!-- 髪の毛の線 -->
    <path stroke-width="1.0" d="M -2,-12 q -8,-3 -10,3 q -2,5 0,12"/>
  </g>

  <!-- ===== 左下：三日月（小） ===== -->
  <g transform="translate(160,1230)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <path stroke-width="1.7" d="M 25,-55 a 60 60 0 1 0 0,110 a 50 50 0 1 1 0,-110 z"/>
    <!-- 下のドット装飾 -->
    <g fill="#b66f6a" stroke="none" opacity="0.85">
      <circle cx="-20" cy="55" r="1"/>
      <circle cx="-10" cy="58" r="1"/>
      <circle cx="0" cy="60" r="1"/>
      <circle cx="10" cy="58" r="1"/>
      <circle cx="20" cy="55" r="1"/>
    </g>
  </g>

  <!-- ===== 右下：日の出＋雲＋鳥 ===== -->
  <g transform="translate(580,1280)" stroke="#b66f6a" fill="none" stroke-linecap="round">
    <!-- 半円の太陽 -->
    <path stroke-width="1.5" d="M -42,30 a 42 42 0 0 1 84,0"/>
    <!-- 太陽の顔薄塗り -->
    <path d="M -42,30 a 42 42 0 0 1 84,0 z" fill="#f0bdb6" opacity="0.4" stroke="none"/>
    <!-- 光線 -->
    <g stroke-width="1.2">
      <line x1="0"   y1="-15" x2="0"   y2="-45"/>
      <line x1="-22" y1="-5"  x2="-38" y2="-32"/>
      <line x1="22"  y1="-5"  x2="38"  y2="-32"/>
      <line x1="-38" y1="15"  x2="-58" y2="3"/>
      <line x1="38"  y1="15"  x2="58"  y2="3"/>
      <line x1="-12" y1="-15" x2="-22" y2="-40" opacity="0.7"/>
      <line x1="12"  y1="-15" x2="22"  y2="-40" opacity="0.7"/>
    </g>
    <!-- 雲（前面） -->
    <path stroke-width="1.4" d="M -85,40 q 5,-22 28,-20 q 8,-15 26,-7 q 14,-12 30,-2 q 18,-10 32,5 q 18,3 18,22"/>
    <!-- 雲（後ろ・浅い） -->
    <path stroke-width="1.4" d="M -98,55 q 8,-14 25,-12 q 28,-15 60,-3 q 30,-12 60,4 q 22,3 28,18"/>
    <!-- 鳥 -->
    <path stroke-width="1.3" d="M 60,-32 q 4,-6 9,0 q 5,-6 9,0"/>
    <path stroke-width="1.3" d="M 80,-48 q 3,-5 7,0 q 4,-5 7,0"/>
  </g>

  <!-- ===== ★散らし要素：4ポイント・ツインクル・小ドット ===== -->
  <g fill="#b66f6a">
    <!-- 4ポイント・ツインクル（上半分） -->
    <g opacity="0.85">
      <path d="M 60,135 l 1.6,4 l 4,1.2 l -3,3 l 0.6,4 l -3.2,-2 l -3.2,2 l 0.6,-4 l -3,-3 l 4,-1.2 z"/>
      <path d="M 240,80 l 1.4,3.5 l 3.5,1 l -2.6,2.6 l 0.5,3.5 l -2.8,-1.8 l -2.8,1.8 l 0.5,-3.5 l -2.6,-2.6 l 3.5,-1 z"/>
      <path d="M 580,90 l 1.4,3.5 l 3.5,1 l -2.6,2.6 l 0.5,3.5 l -2.8,-1.8 l -2.8,1.8 l 0.5,-3.5 l -2.6,-2.6 l 3.5,-1 z"/>
      <path d="M 870,135 l 1.5,4 l 4,1.2 l -3,3 l 0.6,4 l -3.1,-2 l -3.1,2 l 0.6,-4 l -3,-3 l 4,-1.2 z"/>
      <path d="M 380,170 l 1.2,3 l 3,1 l -2.4,2.4 l 0.4,3 l -2.4,-1.5 l -2.4,1.5 l 0.4,-3 l -2.4,-2.4 l 3,-1 z"/>
    </g>
    <!-- 散りばめドット -->
    <g opacity="0.85">
      <circle cx="170" cy="195" r="1.6"/>
      <circle cx="365" cy="135" r="1.2"/>
      <circle cx="500" cy="380" r="1.4"/>
      <circle cx="320" cy="490" r="1.2"/>
      <circle cx="650" cy="560" r="1.4"/>
      <circle cx="100" cy="475" r="1.4"/>
      <circle cx="880" cy="465" r="1.4"/>
      <circle cx="220" cy="640" r="1.2"/>
      <circle cx="380" cy="690" r="1.5"/>
      <circle cx="600" cy="700" r="1.5"/>
      <circle cx="290" cy="850" r="1.2"/>
      <circle cx="700" cy="780" r="1.2"/>
    </g>
    <!-- 4ポイント・ツインクル（下半分） -->
    <g opacity="0.85">
      <path d="M 75,1140 l 1.5,4 l 4,1.2 l -3,3 l 0.6,4 l -3.1,-2 l -3.1,2 l 0.6,-4 l -3,-3 l 4,-1.2 z"/>
      <path d="M 870,1140 l 1.5,4 l 4,1.2 l -3,3 l 0.6,4 l -3.1,-2 l -3.1,2 l 0.6,-4 l -3,-3 l 4,-1.2 z"/>
      <path d="M 320,1390 l 1.4,3.5 l 3.5,1 l -2.6,2.6 l 0.5,3.5 l -2.8,-1.8 l -2.8,1.8 l 0.5,-3.5 l -2.6,-2.6 l 3.5,-1 z"/>
      <path d="M 800,1390 l 1.4,3.5 l 3.5,1 l -2.6,2.6 l 0.5,3.5 l -2.8,-1.8 l -2.8,1.8 l 0.5,-3.5 l -2.6,-2.6 l 3.5,-1 z"/>
      <path d="M 380,1450 l 1.2,3 l 3,1 l -2.4,2.4 l 0.4,3 l -2.4,-1.5 l -2.4,1.5 l 0.4,-3 l -2.4,-2.4 l 3,-1 z"/>
    </g>
    <g opacity="0.85">
      <circle cx="380" cy="1140" r="1.4"/>
      <circle cx="760" cy="1140" r="1.4"/>
      <circle cx="100" cy="1430" r="1.3"/>
      <circle cx="500" cy="1480" r="1.3"/>
      <circle cx="870" cy="1470" r="1.5"/>
      <circle cx="650" cy="1390" r="1.2"/>
    </g>
  </g>
</svg>
